---
- name: Check if yay is installed
  ansible.builtin.command: which yay
  register: yay_check
  changed_when: false
  failed_when: false
  tags:
    - aur
    - yay

- name: Install yay dependencies
  community.general.pacman:
    name:
      - git
      - base-devel
    state: present
  when: yay_check.rc != 0
  tags:
    - aur
    - yay

- name: Clone yay repository
  ansible.builtin.git:
    repo: https://aur.archlinux.org/yay.git
    dest: "/tmp/yay-build"
    version: master
  become: true
  become_user: "{{ user }}"
  when: yay_check.rc != 0
  tags:
    - aur
    - yay

- name: Build and install yay
  ansible.builtin.command: makepkg -si --noconfirm
  args:
    chdir: /tmp/yay-build
  become: true
  become_user: "{{ user }}"
  when: yay_check.rc != 0
  changed_when: true
  tags:
    - aur
    - yay

- name: Clean up yay build directory
  ansible.builtin.file:
    path: /tmp/yay-build
    state: absent
  when: yay_check.rc != 0
  tags:
    - aur
    - yay
