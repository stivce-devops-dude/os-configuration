---
- name: Set home directory path
  ansible.builtin.set_fact:
    user_home: "{{ lookup('env', 'HOME') if ansible_os_family == 'Darwin' else '/home/' + user }}"
  tags:
    - dotfiles

# --- Shared dotfiles ---
- name: Check if shared dotfiles repo exists
  ansible.builtin.stat:
    path: "{{ user_home }}/{{ dotfiles_shared_dir }}/HEAD"
  register: dotfiles_shared_check
  tags:
    - dotfiles

- name: Clone shared dotfiles (bare)
  ansible.builtin.command: >
    git clone --bare {{ dotfiles_shared_repo }}
    {{ user_home }}/{{ dotfiles_shared_dir }}
  become: "{{ ansible_os_family != 'Darwin' }}"
  become_user: "{{ user }}"
  when: not dotfiles_shared_check.stat.exists
  changed_when: true
  tags:
    - dotfiles

- name: Configure shared dotfiles to hide untracked files
  ansible.builtin.command: >
    git --git-dir={{ user_home }}/{{ dotfiles_shared_dir }}
    --work-tree={{ user_home }}
    config status.showUntrackedFiles no
  become: "{{ ansible_os_family != 'Darwin' }}"
  become_user: "{{ user }}"
  changed_when: false
  tags:
    - dotfiles

- name: Pull latest shared dotfiles
  ansible.builtin.shell: >
    git --git-dir={{ user_home }}/{{ dotfiles_shared_dir }}
    --work-tree={{ user_home }}
    fetch origin main &&
    git --git-dir={{ user_home }}/{{ dotfiles_shared_dir }}
    --work-tree={{ user_home }}
    reset --hard FETCH_HEAD
  become: "{{ ansible_os_family != 'Darwin' }}"
  become_user: "{{ user }}"
  register: dotfiles_shared_pull
  changed_when: "'Already up to date' not in dotfiles_shared_pull.stdout"
  when: dotfiles_shared_check.stat.exists
  tags:
    - dotfiles

- name: Checkout shared dotfiles
  ansible.builtin.command: >
    git --git-dir={{ user_home }}/{{ dotfiles_shared_dir }}
    --work-tree={{ user_home }}
    checkout -f
  become: "{{ ansible_os_family != 'Darwin' }}"
  become_user: "{{ user }}"
  changed_when: true
  tags:
    - dotfiles

# --- OS-specific dotfiles ---
- name: Set OS-specific dotfiles repo
  ansible.builtin.set_fact:
    dotfiles_os_repo: "{{ dotfiles_os_repo_map[ansible_os_family] }}"
  tags:
    - dotfiles

- name: Check if OS dotfiles repo exists
  ansible.builtin.stat:
    path: "{{ user_home }}/{{ dotfiles_os_dir }}/HEAD"
  register: dotfiles_os_check
  tags:
    - dotfiles

- name: Clone OS dotfiles (bare)
  ansible.builtin.command: >
    git clone --bare {{ dotfiles_os_repo }}
    {{ user_home }}/{{ dotfiles_os_dir }}
  become: "{{ ansible_os_family != 'Darwin' }}"
  become_user: "{{ user }}"
  when: not dotfiles_os_check.stat.exists
  changed_when: true
  tags:
    - dotfiles

- name: Configure OS dotfiles to hide untracked files
  ansible.builtin.command: >
    git --git-dir={{ user_home }}/{{ dotfiles_os_dir }}
    --work-tree={{ user_home }}
    config status.showUntrackedFiles no
  become: "{{ ansible_os_family != 'Darwin' }}"
  become_user: "{{ user }}"
  changed_when: false
  tags:
    - dotfiles

- name: Pull latest OS dotfiles
  ansible.builtin.shell: >
    git --git-dir={{ user_home }}/{{ dotfiles_os_dir }}
    --work-tree={{ user_home }}
    fetch origin main &&
    git --git-dir={{ user_home }}/{{ dotfiles_os_dir }}
    --work-tree={{ user_home }}
    reset --hard FETCH_HEAD
  become: "{{ ansible_os_family != 'Darwin' }}"
  become_user: "{{ user }}"
  register: dotfiles_os_pull
  changed_when: "'Already up to date' not in dotfiles_os_pull.stdout"
  when: dotfiles_os_check.stat.exists
  tags:
    - dotfiles

- name: Checkout OS dotfiles
  ansible.builtin.command: >
    git --git-dir={{ user_home }}/{{ dotfiles_os_dir }}
    --work-tree={{ user_home }}
    checkout -f
  become: "{{ ansible_os_family != 'Darwin' }}"
  become_user: "{{ user }}"
  changed_when: true
  tags:
    - dotfiles

- name: Apply Zen Browser preferences
  ansible.builtin.command: "{{ user_home }}/.local/bin/zen-apply-prefs"
  become: "{{ ansible_os_family != 'Darwin' }}"
  become_user: "{{ user }}"
  when:
    - ansible_os_family == "Archlinux"
    - not ansible_check_mode
  changed_when: true
  tags:
    - dotfiles
